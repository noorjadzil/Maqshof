<!DOCTYPE html>
<html>
<head>
<title>Laporan Jajan</title>

<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111827">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Segoe UI',sans-serif;
background:#08090c;
min-height:100vh;
color:white;
overflow-x:hidden;
padding:10px;
}

.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at top left,rgba(59,130,246,.08),transparent 45%),
radial-gradient(circle at bottom right,rgba(96,165,250,.06),transparent 48%),
linear-gradient(135deg,#0b1020,#111827,#111827);
z-index:-3;
}

.glow1,.glow2{
position:fixed;
border-radius:50%;
filter:blur(140px);
z-index:-2;
}

.glow1{
width:280px;
height:280px;
background:rgba(59,130,246,.10);
top:-80px;
left:-80px;
}

.glow2{
width:280px;
height:280px;
background:rgba(96,165,250,.08);
bottom:-80px;
right:-80px;
}

.container{
width:100%;
max-width:560px;
margin:auto;
}

.card{
position:relative;
overflow:hidden;
width:100%;
background:linear-gradient(180deg,rgba(17,24,39,.96),rgba(10,15,28,.96));
backdrop-filter:blur(24px);
border:1px solid rgba(255,255,255,0.06);
border-radius:34px;
padding:18px;
box-shadow:0 14px 40px rgba(0,0,0,.42), inset 0 1px 0 rgba(255,255,255,.05);
}

h2{
text-align:center;
font-size:38px;
font-weight:900;
letter-spacing:.6px;
margin:4px 0 2px;
color:#fff;
background:none;
-webkit-text-fill-color:#fff;
text-shadow:
0 1px 0 rgba(255,255,255,.22),
0 10px 30px rgba(37,99,235,.28),
0 0 24px rgba(96,165,250,.10);
position:relative;
z-index:2;
}
.header-subtitle{
text-align:center;
font-size:13px;
font-weight:600;
letter-spacing:2px;
text-transform:uppercase;
color:#94a3b8;
margin-bottom:14px;
}
.header-hero{
position:relative;
margin:-18px -18px 18px;
padding:28px 18px 20px;
border-radius:34px 34px 28px 28px;
background:
radial-gradient(circle at 50% -10%,rgba(96,165,250,.22),transparent 55%),
linear-gradient(180deg,rgba(30,41,59,.72),rgba(17,24,39,.08));
border-bottom:1px solid rgba(255,255,255,.05);
overflow:hidden;
}
.header-hero:after{
content:'';
position:absolute;
left:50%;
bottom:0;
transform:translateX(-50%);
width:110px;
height:3px;
border-radius:99px;
background:linear-gradient(90deg,transparent,#60a5fa,transparent);
opacity:.9;
}


.main-btn{
width:100%;
padding:16px;
border:none;
border-radius:22px;
font-size:15px;
font-weight:800;
cursor:pointer;
transition:0.25s;
color:white;
margin-bottom:0;
background:linear-gradient(135deg,rgba(255,255,255,0.07),rgba(255,255,255,0.03));
border:1px solid rgba(255,255,255,0.06);
backdrop-filter:blur(10px);
}

.main-btn:active{transform:scale(0.98)}

.tab-wrap{
display:flex;
gap:14px;
margin-bottom:4px;
}

.tab-btn{
flex:1;
padding:15px;
border:none;
border-radius:20px;
font-size:14px;
font-weight:800;
cursor:pointer;
transition:0.25s;
color:white;
}

.active{
background:linear-gradient(135deg,#1d4ed8,#2563eb);
box-shadow:0 12px 30px rgba(37,99,235,0.35);
}

.nonactive{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.06);
}

.laporan-card{
width:calc(100% + 60px);
margin:-16px -30px 0;
padding:10px 18px 18px;
border-radius:0;
border-left:none;
border-right:none;
background:linear-gradient(180deg,#172554,#111827 140px,#0b1220);
border:1px solid rgba(255,255,255,0.06);
border-radius:30px;
padding:16px;
backdrop-filter:blur(20px);
box-shadow:0 20px 45px rgba(2,6,23,.45), inset 0 1px 0 rgba(255,255,255,.08);
margin-bottom:20px;
}

.laporan-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:12px;
gap:10px;
}

.header-left{
display:flex;
flex-direction:column;
gap:4px;
}

.judul{
font-size:18px;
font-weight:900;
color:white;
letter-spacing:0.3px;
}

.edited{
font-size:11px;
font-weight:700;
color:#fca5a5;
}

.action-wrap{
display:flex;
gap:8px;
}

.edit-btn,.delete-btn{
width:42px;
height:42px;
display:flex;
align-items:center;
justify-content:center;
border-radius:16px;
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.06);
font-size:16px;
cursor:pointer;
color:white;
}

.delete-btn{
background:rgba(239,68,68,0.12);
border:1px solid rgba(239,68,68,0.22);
}

.laporan-tanggal{
display:flex;
align-items:center;
gap:10px;
padding:12px 14px;
border-radius:18px;
margin-bottom:0;
background:linear-gradient(135deg,rgba(255,255,255,0.07),rgba(255,255,255,0.03));
border:1px solid rgba(255,255,255,0.06);
backdrop-filter:blur(12px);
}

.date-dot{
width:10px;
height:10px;
border-radius:50%;
background:#60a5fa;
box-shadow:0 0 10px rgba(96,165,250,.45);
flex-shrink:0;
}

.date-text{
font-size:14px;
font-weight:800;
letter-spacing:0.2px;
color:#e2e8f0;
}

.laporan-items{
display:flex;
flex-direction:column;
gap:0;
margin-top:-2px;
}

.item-list{
display:grid;
grid-template-columns:1fr auto;
align-items:center;
padding:10px 0;
border-bottom:1px solid rgba(255,255,255,.06);
gap:16px;
}
.item-left{
display:flex;
align-items:center;
gap:10px;
justify-self:start;
}

.item-dot{
width:8px;
height:8px;
border-radius:50%;
background:#60a5fa;
box-shadow:0 0 8px rgba(96,165,250,.4);
}

.item-name{
font-size:15px;
font-weight:700;
color:#f8fafc;
}

.item-jumlah{
width:90px;
justify-self:end;
text-align:right;
font-weight:900;
font-variant-numeric:tabular-nums;
padding:6px 0;
background:none;
border:none;
color:#fff;
}

.note-box{
margin-top:14px;
padding:14px;
border-radius:18px;
background:rgba(239,68,68,0.08);
border:1px solid rgba(239,68,68,0.15);
font-size:14px;
font-weight:700;
line-height:1.5;
color:#fecaca;
}

img{
width:100%;
margin-top:14px;
border-radius:22px;
border:1px solid rgba(255,255,255,0.06);
}

.edit-box{
margin-top:14px;
padding:14px;
border-radius:22px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.06);
}

.input,.small-input,.select-input{
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.06);
border-radius:16px;
padding:13px;
outline:none;
color:white;
}

.input{
width:100%;
margin-top:8px;
margin-bottom:0;
}

.select-input{
width:100%;
}

.select-input option{
background:#111827;
color:white;
}

.small-input{
width:82px;
text-align:center;
}

.item-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
gap:10px;
}

.item-row-left{
flex:1;
}

.remove-row-btn{
width:40px;
height:40px;
border:none;
border-radius:14px;
background:rgba(239,68,68,0.14);
border:1px solid rgba(239,68,68,0.22);
color:white;
font-weight:900;
cursor:pointer;
}

.add-btn,.save-btn,.history-btn{
width:100%;
padding:14px;
border:none;
border-radius:18px;
font-weight:900;
color:white;
margin-top:10px;
cursor:pointer;
}

.add-btn{
background:rgba(255,255,255,0.06);
border:1px dashed rgba(255,255,255,0.20);
}

.save-btn{
background:linear-gradient(135deg,#1d4ed8,#2563eb);
}

.history-btn{
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.06);
}

.history-box{
margin-top:10px;
padding:14px;
border-radius:18px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.06);
font-size:13px;
line-height:1.6;
color:#cbd5e1;
}

.loading{
text-align:center;
padding:30px;
font-weight:800;
color:#94a3b8;
}

.modal-wrap{
position:fixed;
inset:0;
background:rgba(2,6,23,0.72);
backdrop-filter:blur(10px);
display:none;
align-items:center;
justify-content:center;
padding:18px;
z-index:9999;
}

.modal-box{
width:100%;
max-width:360px;
background:linear-gradient(180deg,rgba(15,23,42,0.98),rgba(30,41,59,0.98));
border:1px solid rgba(255,255,255,0.10);
border-radius:26px;
padding:20px;
box-shadow:0 25px 70px rgba(0,0,0,0.55);
}

.modal-title{
font-size:21px;
font-weight:900;
margin-bottom:8px;
}

.modal-text{
font-size:14px;
line-height:1.5;
color:#cbd5e1;
margin-bottom:18px;
}

.modal-actions{
display:flex;
gap:10px;
}

.cancel-btn,.confirm-btn{
flex:1;
padding:14px;
border:none;
border-radius:18px;
font-weight:900;
color:white;
cursor:pointer;
}

.cancel-btn{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.10);
}

.confirm-btn{
background:linear-gradient(135deg,#ef4444,#f97316);
}

.toast{
position:fixed;
left:50%;
bottom:22px;
transform:translateX(-50%);
background:rgba(15,23,42,0.96);
border:1px solid rgba(255,255,255,0.12);
padding:13px 18px;
border-radius:18px;
font-weight:800;
box-shadow:0 15px 35px rgba(0,0,0,0.45);
display:none;
z-index:10000;
}

@media(max-width:430px){
body{padding:8px}
.card{padding:12px;border-radius:24px}
.laporan-card{padding:14px;border-radius:22px}
h2{
text-align:center;
font-size:38px;
font-weight:900;
letter-spacing:.6px;
margin:4px 0 2px;
color:#fff;
background:none;
-webkit-text-fill-color:#fff;
text-shadow:
0 1px 0 rgba(255,255,255,.22),
0 10px 30px rgba(37,99,235,.28),
0 0 24px rgba(96,165,250,.10);
position:relative;
z-index:2;
}
.header-subtitle{
text-align:center;
font-size:13px;
font-weight:600;
letter-spacing:2px;
text-transform:uppercase;
color:#94a3b8;
margin-bottom:14px;
}
.header-hero{
position:relative;
margin:-18px -18px 18px;
padding:28px 18px 20px;
border-radius:34px 34px 28px 28px;
background:
radial-gradient(circle at 50% -10%,rgba(96,165,250,.22),transparent 55%),
linear-gradient(180deg,rgba(30,41,59,.72),rgba(17,24,39,.08));
border-bottom:1px solid rgba(255,255,255,.05);
overflow:hidden;
}
.header-hero:after{
content:'';
position:absolute;
left:50%;
bottom:0;
transform:translateX(-50%);
width:110px;
height:3px;
border-radius:99px;
background:linear-gradient(90deg,transparent,#60a5fa,transparent);
opacity:.9;
}

}

.card::before{
content:'';
position:absolute;
left:0;
top:0;
width:100%;
height:2px;
background:rgba(255,255,255,0.06);
}


/* old accent disabled */
.title-accent{display:none}
.title-accent{
width:72px;
height:4px;
margin:-8px auto 18px;
border-radius:999px;
background:linear-gradient(90deg,rgba(59,130,246,.15),rgba(96,165,250,.9),rgba(59,130,246,.15));
box-shadow:0 0 12px rgba(96,165,250,.18);
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="glow1"></div>
<div class="glow2"></div>

<div class="container">
<div class="card">

<div class="header-hero">
<h2>Laporan Jajan</h2>
<div class="header-subtitle">Monitoring Penjualan Harian</div>
</div>

<div class="tab-wrap">
<button id="btnLaporan" class="tab-btn active" onclick="showTab('laporan')">📋 Laporan</button>
<button id="btnRekap" class="tab-btn nonactive" onclick="showTab('rekap')">📊 Rekap</button>
</div>

<div id="tabLaporan">
<div id="listLaporan" class="loading">Loading...</div>
</div>

<div id="tabRekap" style="display:none">
<div id="rekapHarian" class="loading">Loading...</div>
</div>

</div>
</div>

<div id="deleteModal" class="modal-wrap">
<div class="modal-box">
<div class="modal-title">Hapus transaksi?</div>
<div class="modal-text">
Data transaksi ini akan dihapus permanen dari Firebase. Tindakan ini tidak bisa dibatalkan.
</div>
<div class="modal-actions">
<button class="cancel-btn" onclick="closeDeleteModal()">Batal</button>
<button class="confirm-btn" onclick="hapusTransaksi()">Hapus</button>
</div>
</div>
</div>

<div id="toast" class="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
function kembali(){
window.location.href="index.html";
}

function showTab(tab){
const laporan=document.getElementById("tabLaporan");
const rekap=document.getElementById("tabRekap");
const btnLaporan=document.getElementById("btnLaporan");
const btnRekap=document.getElementById("btnRekap");

if(tab==="laporan"){
laporan.style.display="block";
rekap.style.display="none";
btnLaporan.className="tab-btn active";
btnRekap.className="tab-btn nonactive";
}else{
laporan.style.display="none";
rekap.style.display="block";
btnLaporan.className="tab-btn nonactive";
btnRekap.className="tab-btn active";
}
}

firebase.initializeApp({
databaseURL:"https://maqshof-d5772-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const db=firebase.database();

let masterItems=[];
let deleteKey=null;

function toast(pesan){
let t=document.getElementById("toast");
t.innerText=pesan;
t.style.display="block";
setTimeout(()=>{t.style.display="none"},2200);
}

function formatTanggal(waktu){
let date=new Date(waktu);
const hariMap={'Sunday':'Ahad','Monday':'Senin','Tuesday':'Selasa','Wednesday':'Rabu','Thursday':'Kamis','Friday':'Jumat','Saturday':'Sabtu'};
let hari=hariMap[date.toLocaleDateString('en-US',{weekday:'long'})];
let tanggal=date.toLocaleDateString("id-ID",{day:"numeric",month:"long",year:"numeric"});
let jam=date.toLocaleTimeString("id-ID",{hour:"2-digit",minute:"2-digit"});
return `${hari} • ${tanggal} • ${jam}`;
}

function formatTanggalHari(waktu){
let date=new Date(waktu);
const hariMap={
'Sunday':'Ahad',
'Monday':'Senin',
'Tuesday':'Selasa',
'Wednesday':'Rabu',
'Thursday':'Kamis',
'Friday':'Jumat',
'Saturday':'Sabtu'
};
let hari=hariMap[date.toLocaleDateString('en-US',{weekday:'long'})];
let tanggal=date.toLocaleDateString("id-ID",{day:"numeric",month:"long",year:"numeric"});
return `${hari}, ${tanggal}`;
}

function loadMasterItems(callback){
db.ref("items").once("value",snap=>{
masterItems=[];
if(snap.exists()){
snap.forEach(c=>{
let d=c.val();
masterItems.push({
nama:d.nama || d.barang || "",
harga:Number(d.harga || 0)
});
});
}
if(callback) callback();
});
}

function optionItems(selected){
let html=`<option value="">Pilih item</option>`;
masterItems.forEach(i=>{
let pilih=i.nama===selected ? "selected" : "";
html+=`<option value="${i.nama}" ${pilih}>${i.nama}</option>`;
});
html+=`<option value="__manual__">+ Item manual</option>`;
return html;
}

function loadLaporan(){
let list=document.getElementById("listLaporan");
list.innerHTML=`<div class="loading">Loading...</div>`;

db.ref("jajan").limitToLast(50).once("value",snap=>{
list.innerHTML="";

if(!snap.exists()){
list.innerHTML=`<div class="loading">Belum ada data</div>`;
return;
}

let arr=[];
snap.forEach(c=>{
let d=c.val();
d.key=c.key;
arr.push(d);
});

arr.reverse();

arr.forEach(d=>{
const itemKhusus=[
"terang bulan",
"mie ayam",
"bakso",
"es teh",
"es jeruk",
"es blewah",
"es coklat",
"jus alpukat",
"es sari kedelai",
"aneka snack",
"jajanan 3000"
];

const filteredItems=(d.items || [])
.filter(i=>{
const nama=(i.barang||"").toLowerCase().trim();
const kategori=(i.kategori||"").toLowerCase();

if(kategori.includes("es")) return false;
if(kategori.includes("snack")) return false;
if(kategori.includes("jajanan")) return false;
if(kategori.includes("mie ayam")) return false;
if(kategori.includes("bakso")) return false;
if(kategori.includes("terang bulan")) return false;

return !itemKhusus.includes(nama);
});

if(filteredItems.length===0){
return;
}

let items=filteredItems.map(i=>`
<div class="item-list">
<div class="item-left">
<div class="item-dot"></div>
<div class="item-name">${i.barang}</div>
</div>
<div class="item-jumlah">${i.jumlah}</div>
</div>
`).join("");

let div=document.createElement("div");
div.className="laporan-card";

div.innerHTML=`
<div class="laporan-header">
<div class="header-left">
<div class="judul">${d.jenis} • ${d.tempat}</div>
${d.riwayatEdit ? `<div class="edited">EDITED</div>` : ""}
</div>
</div></div>

<div class="laporan-tanggal">
<div class="date-dot"></div>
<div class="date-text">${formatTanggal(d.waktu)}</div>
</div>

<div class="laporan-items">${items}</div>



${d.catatan ? `<div class="note-box">📝 ${d.catatan}</div>` : ""}
${d.foto ? `<img src="${d.foto}">` : ""}
`;

list.appendChild(div);
});
});
}

function loadRekap(){
let container=document.getElementById("rekapHarian");
container.innerHTML=`<div class="loading">Loading...</div>`;

db.ref("items").once("value",snapItem=>{
let hargaMap={};

if(snapItem.exists()){
snapItem.forEach(c=>{
let d=c.val();
let nama=(d.nama || "").toLowerCase().trim();
hargaMap[nama]=Number(d.harga || 0);
});
}

db.ref("jajan").once("value",snap=>{
if(!snap.exists()){
container.innerHTML=`<div class="loading">Belum ada data</div>`;
return;
}

let data=Object.values(snap.val());
let grup={};

data.forEach(d=>{
if(!d.waktu) return;

let dateObj=new Date(d.waktu);
if(isNaN(dateObj)) return;

let key=dateObj.toLocaleDateString("id-ID",{year:"numeric",month:"2-digit",day:"2-digit"});
let label=formatTanggalHari(dateObj);

if(!grup[key]){
grup[key]={
label:label,
masukIkhwan:0,
masukAkhwat:0,
sisaIkhwan:0,
sisaAkhwat:0,
totalUang:0
};
}

let jenis=(d.jenis || "").toLowerCase();
let tempat=(d.tempat || "").toLowerCase();

const itemKhusus=[
"terang bulan",
"mie ayam",
"bakso",
"es teh",
"es jeruk",
"es blewah",
"es coklat",
"jus alpukat",
"es sari kedelai",
"aneka snack",
"jajanan 3000"
];

(d.items || []).forEach(i=>{
let nama=(i.barang || "").toLowerCase().trim();
let kategori=(i.kategori || "").toLowerCase();

if(kategori.includes("es")) return;
if(kategori.includes("snack")) return;
if(kategori.includes("jajanan")) return;
if(kategori.includes("mie ayam")) return;
if(kategori.includes("bakso")) return;
if(kategori.includes("terang bulan")) return;

if(itemKhusus.includes(nama)) return;

let jumlah=Number(i.jumlah || 0);
let harga=hargaMap[nama] || 0;
let subtotal=jumlah * harga;

if(jenis.includes("masuk") && tempat.includes("ikhwan")){
grup[key].masukIkhwan += jumlah;
grup[key].totalUang += subtotal;
}

if(jenis.includes("masuk") && tempat.includes("akhwat")){
grup[key].masukAkhwat += jumlah;
grup[key].totalUang += subtotal;
}

if(jenis.includes("sisa") && tempat.includes("ikhwan")){
grup[key].sisaIkhwan += jumlah;
}

if(jenis.includes("sisa") && tempat.includes("akhwat")){
grup[key].sisaAkhwat += jumlah;
}
});
});

container.innerHTML="";

Object.keys(grup).sort((a,b)=>new Date(b)-new Date(a)).forEach(key=>{
let g=grup[key];

let terjual=(g.masukIkhwan + g.masukAkhwat) - (g.sisaIkhwan + g.sisaAkhwat);
if(terjual < 0) terjual=0;

let div=document.createElement("div");
div.className="laporan-card";

div.innerHTML=`
<div class="laporan-header">
<div class="judul">📊 Rekap Harian</div>
</div>

<div class="laporan-tanggal">
<div class="date-dot"></div>
<div class="date-text">${g.label}</div>
</div>

<div class="laporan-items">
<div class="item-list"><div class="item-left"><div class="item-name">Masuk Ikhwan</div></div><div class="item-jumlah">${g.masukIkhwan}</div></div>
<div class="item-list"><div class="item-left"><div class="item-name">Masuk Akhwat</div></div><div class="item-jumlah">${g.masukAkhwat}</div></div>
<div class="item-list"><div class="item-left"><div class="item-name">Sisa Ikhwan</div></div><div class="item-jumlah">${g.sisaIkhwan}</div></div>
<div class="item-list"><div class="item-left"><div class="item-name">Sisa Akhwat</div></div><div class="item-jumlah">${g.sisaAkhwat}</div></div>
<div class="item-list"><div class="item-left"><div class="item-name">Terjual</div></div><div class="item-jumlah">${terjual}</div></div>
<div class="item-list"><div class="item-left"><div class="item-name">Total</div></div><div class="item-jumlah">Rp ${g.totalUang.toLocaleString("id-ID")}</div></div>
</div>
`;

container.appendChild(div);
});
});
});
}

function toggleEdit(key){
let box=document.getElementById("edit-"+key);

if(box.style.display==="block"){
box.style.display="none";
box.innerHTML="";
return;
}

loadMasterItems(()=>{
db.ref("jajan/"+key).once("value",snap=>{
let d=snap.val();
let dateObj=new Date(d.waktu);

let local=
dateObj.getFullYear()+"-"+
String(dateObj.getMonth()+1).padStart(2,"0")+"-"+
String(dateObj.getDate()).padStart(2,"0")+"T"+
String(dateObj.getHours()).padStart(2,"0")+":"+
String(dateObj.getMinutes()).padStart(2,"0");

box.innerHTML=`
<div class="edit-box">
<b>✏️ Edit Data</b>
<br><br>

Tanggal
<input type="datetime-local" id="tglEdit-${key}" value="${local}" class="input">

<div id="editItems-${key}"></div>

<button onclick="tambahItemEdit('${key}')" class="add-btn">+ Tambah Item</button>

<button onclick="simpanEdit('${key}')" class="save-btn">💾 Simpan</button>

<button onclick="lihatRiwayat('${key}')" class="history-btn">📜 Riwayat Edit</button>

<div id="history-${key}" style="display:none"></div>
</div>
`;

box.style.display="block";

(d.items || []).forEach(i=>{
tambahItemEdit(key,i.barang,i.jumlah);
});
});
});
}

function tambahItemEdit(key,barang="",jumlah=0){
let wrap=document.getElementById("editItems-"+key);
let idx=Date.now()+Math.floor(Math.random()*9999);

let div=document.createElement("div");
div.className="item-row";
div.id="row-"+key+"-"+idx;

div.innerHTML=`
<div class="item-row-left">
<select class="select-input barang-edit-${key}" onchange="cekManualItem(this,'${key}','${idx}')">
${optionItems(barang)}
</select>
<input type="text" class="input manual-edit-${key}" id="manual-${key}-${idx}" placeholder="Nama item manual" style="display:none;margin-bottom:0">
</div>

<input type="number" value="${jumlah}" class="small-input jumlah-edit-${key}">

<button class="remove-row-btn" onclick="hapusBarisEdit('${key}','${idx}')">×</button>
`;

wrap.appendChild(div);

let select=div.querySelector("select");
if(barang && !masterItems.some(i=>i.nama===barang)){
select.value="__manual__";
let manual=document.getElementById("manual-"+key+"-"+idx);
manual.style.display="block";
manual.value=barang;
}
}

function cekManualItem(select,key,idx){
let manual=document.getElementById("manual-"+key+"-"+idx);
if(select.value==="__manual__"){
manual.style.display="block";
manual.focus();
}else{
manual.style.display="none";
manual.value="";
}
}

function hapusBarisEdit(key,idx){
let row=document.getElementById("row-"+key+"-"+idx);
if(row) row.remove();
}

function simpanEdit(key){
db.ref("jajan/"+key).once("value",snap=>{
let oldData=snap.val();

let tglInput=document.getElementById("tglEdit-"+key).value;
let newDate=new Date(tglInput);

if(isNaN(newDate)){
toast("Tanggal salah");
return;
}

let selects=document.querySelectorAll(".barang-edit-"+key);
let jumlahs=document.querySelectorAll(".jumlah-edit-"+key);
let manuals=document.querySelectorAll(".manual-edit-"+key);

let newItems=[];

selects.forEach((s,idx)=>{
let nama=s.value;

if(nama==="__manual__"){
nama=(manuals[idx].value || "").trim();
}

let jumlah=Number(jumlahs[idx].value || 0);

if(nama){
newItems.push({
barang:nama,
jumlah:jumlah
});
}
});

if(newItems.length===0){
toast("Minimal isi 1 item");
return;
}

let newData={
waktu:newDate.toISOString(),
items:newItems
};

db.ref("jajan/"+key+"/riwayatEdit").push({
waktuEdit:new Date().toISOString(),
sebelum:oldData.items || [],
sesudah:newItems
});

db.ref("jajan/"+key).update(newData).then(()=>{
toast("Berhasil diupdate");
loadLaporan();
loadRekap();
});
});
}

function lihatRiwayat(key){
let box=document.getElementById("history-"+key);

if(box.style.display==="block"){
box.style.display="none";
return;
}

db.ref("jajan/"+key+"/riwayatEdit").once("value",snap=>{
if(!snap.exists()){
box.innerHTML=`<div class="history-box">Belum ada riwayat</div>`;
box.style.display="block";
return;
}

let html="";

snap.forEach(c=>{
let d=c.val();

html += `
<div class="history-box">
<b>${new Date(d.waktuEdit).toLocaleString("id-ID")}</b>
<br><br>
Sebelum :
${(d.sebelum || []).map(i=>`${i.barang}: ${i.jumlah}`).join(", ")}
<br>
Sesudah :
${(d.sesudah || []).map(i=>`${i.barang}: ${i.jumlah}`).join(", ")}
</div>
`;
});

box.innerHTML=html;
box.style.display="block";
});
}

function openDeleteModal(key){
deleteKey=key;
document.getElementById("deleteModal").style.display="flex";
}

function closeDeleteModal(){
deleteKey=null;
document.getElementById("deleteModal").style.display="none";
}

function hapusTransaksi(){
if(!deleteKey) return;

db.ref("jajan/"+deleteKey).remove().then(()=>{
closeDeleteModal();
toast("Transaksi berhasil dihapus");
loadLaporan();
loadRekap();
});
}

loadLaporan();
loadRekap();
</script>

</body>
</html>
