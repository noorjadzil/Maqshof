<!DOCTYPE html>
<html>
<head>
<title>ABSENSI ONLINE</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:monospace;
background:black;
color:#00ff00;
text-align:center;
}

.box{
border:1px solid #00ff00;
padding:20px;
max-width:350px;
margin:auto;
}

input{
width:90%;
padding:10px;
margin:5px;
background:black;
color:#00ff00;
border:1px solid #00ff00;
}

button{
padding:10px;
margin:5px;
background:black;
color:#00ff00;
border:1px solid #00ff00;
cursor:pointer;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

td,th{
border:1px solid #00ff00;
padding:5px;
}

</style>

</head>

<body>

<h2>SISTEM ABSENSI</h2>

<div class="box">

<input id="nama" placeholder="Nama">

<input id="nik" placeholder="NIK">

<button onclick="ambilLokasi()">Ambil Lokasi</button>

<p id="lokasi">Lokasi belum diambil</p>

<button onclick="kirim()">Kirim Absensi</button>

<p id="status"></p>

</div>

<br>

<button onclick="lihatRiwayat()">Lihat Riwayat</button>

<table>

<thead>

<tr>
<th>Nama</th>
<th>NIK</th>
<th>Waktu</th>
</tr>

</thead>

<tbody id="riwayat"></tbody>

</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
query,
limit
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig={

apiKey:"APIKEY",
authDomain:"DOMAIN",
projectId:"PROJECTID",
storageBucket:"STORAGE",
messagingSenderId:"ID",
appId:"APPID"

};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let latitude="";
let longitude="";

window.ambilLokasi=function(){

navigator.geolocation.getCurrentPosition(function(pos){

latitude=pos.coords.latitude;
longitude=pos.coords.longitude;

document.getElementById("lokasi").innerText=
"Lokasi: "+latitude+" , "+longitude;

});

}

window.kirim=async function(){

let nama=document.getElementById("nama").value;
let nik=document.getElementById("nik").value;

if(!nama || !nik || !latitude)
return alert("Lengkapi data");

document.getElementById("status").innerText="Mengirim...";

await addDoc(collection(db,"absensi"),{

nama,
nik,
waktu:new Date().toLocaleString(),
latitude,
longitude

});

document.getElementById("status").innerText="✅ Berhasil";

}

window.lihatRiwayat=async function(){

let tbody=document.getElementById("riwayat");

tbody.innerHTML="Loading...";

const q=query(collection(db,"absensi"),limit(20));

const querySnapshot=await getDocs(q);

tbody.innerHTML="";

querySnapshot.forEach(doc=>{

let d=doc.data();

tbody.innerHTML+=`

<tr>

<td>${d.nama}</td>

<td>${d.nik}</td>

<td>${d.waktu}</td>

</tr>

`;

});

}

</script>

</body>

</html>
