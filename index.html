<!DOCTYPE html>
<html>
<head>
<title>CYBER ABSENSI ONLINE</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:black;
color:#00ff00;
font-family:monospace;
overflow:hidden;
}

#matrix{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.container{
text-align:center;
padding:20px;
}

.box{
border:1px solid #00ff00;
padding:20px;
max-width:350px;
margin:auto;
}

input{
width:90%;
padding:10px;
margin:5px;
background:black;
border:1px solid #00ff00;
color:#00ff00;
}

button{
padding:10px 20px;
background:black;
border:1px solid #00ff00;
color:#00ff00;
cursor:pointer;
margin-top:10px;
}

img{
margin-top:10px;
width:150px;
border:1px solid #00ff00;
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<h2>CYBER ABSENSI</h2>

<div class="box">

<input type="text" id="nama" placeholder="Nama">
<input type="text" id="nik" placeholder="NIK">

<br><br>

<input type="file" id="foto" accept="image/*" capture="camera">

<br>

<img id="preview">

<br>

<button onclick="ambilLokasi()">Ambil Lokasi</button>

<p id="lokasi">Lokasi belum diambil</p>

<button onclick="kirim()">KIRIM ABSENSI</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "ISI_APIKEY",
authDomain: "ISI_DOMAIN",
projectId: "ISI_PROJECTID",
storageBucket: "ISI_STORAGE",
messagingSenderId: "ISI_ID",
appId: "ISI_APPID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let latitude="";
let longitude="";
let fotoBase64="";

document.getElementById("foto").addEventListener("change",function(e){

let file=e.target.files[0];
let reader=new FileReader();

reader.onload=function(){
fotoBase64=reader.result;
document.getElementById("preview").src=fotoBase64;
}

reader.readAsDataURL(file);

});

window.ambilLokasi=function(){

navigator.geolocation.getCurrentPosition(function(pos){

latitude=pos.coords.latitude;
longitude=pos.coords.longitude;

document.getElementById("lokasi").innerText=
"Lokasi: "+latitude+" , "+longitude;

});

}

window.kirim=async function(){

let nama=document.getElementById("nama").value;
let nik=document.getElementById("nik").value;

if(!nama || !nik || !latitude)
return alert("Lengkapi data dulu");

let waktu=new Date().toLocaleString();

await addDoc(collection(db,"absensi"),{

nama,
nik,
waktu,
latitude,
longitude,
foto:fotoBase64

});

alert("ABSENSI BERHASIL");

document.getElementById("nama").value="";
document.getElementById("nik").value="";
document.getElementById("preview").src="";
document.getElementById("lokasi").innerText="Lokasi belum diambil";

}

</script>

<script>

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

const letters="01";
const fontSize=14;
const columns=canvas.width/fontSize;

const drops=[];

for(let x=0;x<columns;x++){
drops[x]=1;
}

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ff00";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

const text=letters.charAt(Math.floor(Math.random()*letters.length));

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975){
drops[i]=0;
}

drops[i]++;

}

}

setInterval(draw,33);

</script>

</body>
</html>
