<!DOCTYPE html>
<html>
<head>
<title>CYBER ABSENSI SYSTEM</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:black;
color:#00ff00;
font-family:monospace;
overflow-x:hidden;
}

#matrix{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.container{
text-align:center;
padding:20px;
}

.box{
border:1px solid #00ff00;
padding:20px;
max-width:400px;
margin:auto;
}

input{
width:90%;
padding:10px;
margin:5px;
background:black;
border:1px solid #00ff00;
color:#00ff00;
}

button{
padding:10px 20px;
margin:5px;
background:black;
border:1px solid #00ff00;
color:#00ff00;
cursor:pointer;
}

video,canvas{
width:200px;
border:1px solid #00ff00;
margin-top:10px;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

td,th{
border:1px solid #00ff00;
padding:5px;
}

#status{
margin-top:10px;
font-weight:bold;
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<h2>CYBER ABSENSI</h2>

<div class="box">

<input type="text" id="nama" placeholder="Nama">
<input type="text" id="nik" placeholder="NIK">

<br>

<video id="kamera" autoplay></video>

<br>

<button onclick="ambilFoto()">Selfie</button>

<br>

<canvas id="foto"></canvas>

<br>

<button onclick="ambilLokasi()">Ambil Lokasi</button>

<p id="lokasi">Lokasi belum diambil</p>

<button onclick="kirim()">KIRIM ABSENSI</button>

<p id="status"></p>

</div>

<h3>Riwayat Absensi</h3>

<table>

<thead>
<tr>
<th>Nama</th>
<th>NIK</th>
<th>Waktu</th>
</tr>
</thead>

<tbody id="riwayat"></tbody>

</table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "APIKEY",
authDomain: "DOMAIN",
projectId: "PROJECTID",
storageBucket: "STORAGE",
messagingSenderId: "ID",
appId: "APPID"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let latitude="";
let longitude="";
let fotoBase64="";

const video=document.getElementById("kamera");

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
video.srcObject=stream;
});

window.ambilFoto=function(){

let canvas=document.getElementById("foto");
let ctx=canvas.getContext("2d");

canvas.width=150;
canvas.height=120;

ctx.drawImage(video,0,0,150,120);

fotoBase64=canvas.toDataURL("image/jpeg",0.5);

}

window.ambilLokasi=function(){

navigator.geolocation.getCurrentPosition(function(pos){

latitude=pos.coords.latitude;
longitude=pos.coords.longitude;

document.getElementById("lokasi").innerText=
"Lokasi: "+latitude+" , "+longitude;

});

}

window.kirim=async function(){

let status=document.getElementById("status");

let nama=document.getElementById("nama").value;
let nik=document.getElementById("nik").value;

if(!nama || !nik || !latitude)
return alert("Data belum lengkap");

status.innerText="Mengirim...";

try{

let waktu=new Date().toLocaleString();

await addDoc(collection(db,"absensi"),{
nama,
nik,
waktu,
latitude,
longitude
});

status.innerText="✅ Absensi berhasil";

}
catch(e){

status.innerText="❌ Gagal mengirim";

}

}
try{

let waktu=new Date().toLocaleString();

await addDoc(collection(db,"absensi"),{

nama,
nik,
waktu,
latitude,
longitude,
foto:fotoBase64

});

status.innerText="✅ Absensi berhasil";

loadData();

}
catch(e){

status.innerText="❌ Gagal mengirim";

}

}

async function loadData(){

let tbody=document.getElementById("riwayat");
tbody.innerHTML="";

const querySnapshot=await getDocs(collection(db,"absensi"));

querySnapshot.forEach(doc=>{

let d=doc.data();

tbody.innerHTML+=`

<tr>
<td>${d.nama}</td>
<td>${d.nik}</td>
<td>${d.waktu}</td>
</tr>

`;

});

}

loadData();

</script>

<script>

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

const letters="01";
const fontSize=14;
const columns=canvas.width/fontSize;

const drops=[];

for(let x=0;x<columns;x++){
drops[x]=1;
}

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ff00";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

const text=letters.charAt(Math.floor(Math.random()*letters.length));

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975){
drops[i]=0;
}

drops[i]++;

}

}

setInterval(draw,33);

</script>

</body>
</html>
